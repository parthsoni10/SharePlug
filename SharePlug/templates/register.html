{% extends "base.html" %}
{% block content %}
<style>
  .auth-page{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - var(--nav-h));padding:20px;}
  .auth-card{width:100%;max-width:520px;background:var(--navy-card);border:1px solid var(--border);border-radius:var(--radius);padding:40px;box-shadow:var(--shadow);transition:background-color 0.3s,border-color 0.3s;}
  .auth-title{font-size:1.6rem;font-weight:700;margin-bottom:6px;text-align:center;}
  .auth-sub{color:var(--text-muted);font-size:0.9rem;text-align:center;margin-bottom:32px;}
  .auth-footer{text-align:center;margin-top:20px;font-size:0.85rem;color:var(--text-muted);}
  .auth-footer a{color:var(--green);text-decoration:none;font-weight:600;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:480px){.auth-card{padding:28px 20px;}.auth-title{font-size:1.4rem;}.form-row{grid-template-columns:1fr;}}
</style>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-title">Create Account ⚡</div>
    <div class="auth-sub">Join India's fastest EV charging network</div>
    <form method="POST">
      {% csrf_token %}
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" class="form-control" name="firstname" required placeholder="John">
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" class="form-control" name="lastname" required placeholder="Doe">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" name="email" required placeholder="john@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" name="Username" required placeholder="Choose a username">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" name="password" required placeholder="Min 6 chars">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-control" name="confirm_password" required placeholder="Repeat password">
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px;">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
    </form>
    <div class="auth-footer">Already have an account? <a href="/login/">Sign in</a></div>
  </div>
</div>
{% endblock %}
