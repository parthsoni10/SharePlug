{% extends "base.html" %}
{% block content %}
<style>
  .auth-page{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - var(--nav-h));padding:20px;}
  .auth-card{width:100%;max-width:440px;background:var(--navy-card);border:1px solid var(--border);border-radius:var(--radius);padding:40px;box-shadow:var(--shadow);transition:background-color 0.3s,border-color 0.3s;}
  .auth-title{font-size:1.6rem;font-weight:700;margin-bottom:6px;text-align:center;}
  .auth-sub{color:var(--text-muted);font-size:0.9rem;text-align:center;margin-bottom:32px;}
  .auth-footer{text-align:center;margin-top:20px;font-size:0.85rem;color:var(--text-muted);}
  .auth-footer a{color:var(--green);text-decoration:none;font-weight:600;}
  .auth-footer a:hover{text-decoration:underline;}
  .auth-divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:var(--text-muted);font-size:0.8rem;}
  .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border);}
  @media(max-width:480px){.auth-card{padding:28px 20px;}.auth-title{font-size:1.4rem;}}
</style>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-title">Welcome Back ⚡</div>
    <div class="auth-sub">Sign in to your SharePlug account</div>
    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" name="Username" autocomplete="username" required placeholder="Enter your username">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" name="password" autocomplete="current-password" required placeholder="Enter your password">
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px;">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>
    <div class="auth-footer">
      Don't have an account? <a href="/register/">Create one</a>
    </div>
  </div>
</div>
{% endblock %}
